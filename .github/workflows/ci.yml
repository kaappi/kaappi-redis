name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Build Kaappi and kaappi-net
        run: |
          git clone --depth 1 https://github.com/kaappi/kaappi.git /tmp/kaappi
          cd /tmp/kaappi && zig build -Doptimize=ReleaseSafe
          git clone --depth 1 https://github.com/kaappi/kaappi-net.git /tmp/kaappi-net
          cd /tmp/kaappi-net && sudo apt-get update && sudo apt-get install -y libssl-dev && make

      - name: Build native library
        run: make

      - name: Run offline tests
        run: |
          export LD_LIBRARY_PATH=.:/tmp/kaappi-net
          /tmp/kaappi/zig-out/bin/kaappi --lib-path lib --lib-path /tmp/kaappi-net/lib tests/test-resp.scm
