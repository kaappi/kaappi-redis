name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]

    services:
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: --health-cmd "redis-cli ping" --health-interval 10s

    steps:
      - uses: actions/checkout@v4

      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0

      - name: Install OpenSSL (Ubuntu)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y libssl-dev

      - name: Install Redis (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install redis
          redis-server --daemonize yes

      - name: Build Kaappi
        run: |
          git clone --depth 1 https://github.com/kaappi/kaappi.git /tmp/kaappi
          cd /tmp/kaappi && zig build

      - name: Build dependencies
        run: |
          git clone --depth 1 https://github.com/kaappi/kaappi-net.git /tmp/kaappi-net
          cd /tmp/kaappi-net && make

      - name: Build native library
        run: make

      - name: Run RESP tests
        run: |
          /tmp/kaappi/zig-out/bin/kaappi \
            --lib-path /tmp/kaappi-net/lib \
            --lib-path lib \
            tests/test-resp.scm
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}:/tmp/kaappi-net
          LD_LIBRARY_PATH: ${{ github.workspace }}:/tmp/kaappi-net

      - name: Run command tests
        run: |
          /tmp/kaappi/zig-out/bin/kaappi \
            --lib-path /tmp/kaappi-net/lib \
            --lib-path lib \
            tests/test-commands.scm
        env:
          DYLD_LIBRARY_PATH: ${{ github.workspace }}:/tmp/kaappi-net
          LD_LIBRARY_PATH: ${{ github.workspace }}:/tmp/kaappi-net
